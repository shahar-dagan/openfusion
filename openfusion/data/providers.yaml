    provider: openai
    context: 128000
    tier: strong
    input_cost: 2.50
    output_cost: 10.00

  - id: openai/gpt-4o-mini
    provider: openai
    context: 128000
    tier: fast
    input_cost: 0.15
    output_cost: 0.60

